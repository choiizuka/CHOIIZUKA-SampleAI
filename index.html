<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CHOIIZUKA-AI</title>
  <style>
    /* =======================================================
       🎨 テーマ変数定義（引き算の美学：CSSだけでモードを制御）
       ======================================================= */
    
    /* 1. 標準（初期値）はOSの設定に合わせる：自動ライトモード */
    :root {
      --bg-color: #ffffff;
      --chat-bg: #f8f9fa;
      --text-color: #212529;
      --accent-color: #007bff;
      --border-color: #dee2e6;
      --user-msg-bg: #007bff;
      --user-msg-text: #ffffff;
    }

    /* 2. OSの設定がダークモードの場合、自動でこちらを適用 */
    @media (prefers-color-scheme: dark) {
      :root {
        --bg-color: #1a1a1a;
        --chat-bg: #2d2d2d;
        --text-color: #ffffff;
        --border-color: #444444;
        --user-msg-bg: #007bff;
        --user-msg-text: #ffffff;
      }
    }

    /* 3. ボタンで明示的に切り替えた場合の「強制ライト / ダーク」の上書き */
    :root[data-theme="light"] {
      --bg-color: #ffffff;
      --chat-bg: #f8f9fa;
      --text-color: #212529;
      --border-color: #dee2e6;
    }
    :root[data-theme="dark"] {
      --bg-color: #1a1a1a;
      --chat-bg: #2d2d2d;
      --text-color: #ffffff;
      --border-color: #444444;
    }

    /* =======================================================
       📐 レイアウト・スタイル（変数を使うため変更なし・堅牢設計）
       ======================================================= */
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg-color);
      color: var(--text-color);
      margin: 0;
      padding: 0;
      display: flex;
      flex-direction: column;
      height: 100vh;
      transition: background 0.3s, color 0.3s; /* 切り替えを滑らかに */
    }
    header {
      background: var(--chat-bg);
      padding: 1rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-weight: bold;
      font-size: 1.2rem;
      border-bottom: 1px solid var(--border-color);
    }
    
    /* テーマ切り替えスイッチボタン */
    .theme-toggle-btn {
      background: transparent;
      border: 1px solid var(--border-color);
      color: var(--text-color);
      padding: 0.4rem 0.8rem;
      font-size: 0.85rem;
      border-radius: 4px;
      cursor: pointer;
    }
    
    #status-container {
      background: rgba(255, 204, 0, 0.15);
      color: var(--text-color);
      padding: 0.5rem 1rem;
      font-size: 0.85rem;
      font-family: monospace;
      border-bottom: 1px solid var(--border-color);
    }
    #chat-container {
      flex: 1;
      overflow-y: auto;
      padding: 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }
    .message {
      max-width: 80%;
      padding: 0.75rem 1rem;
      border-radius: 8px;
      line-height: 1.5;
      word-break: break-word;
    }
    .user {
      background: var(--user-msg-bg);
      color: var(--user-msg-text);
      align-self: flex-end;
    }
    .ai {
      background: var(--chat-bg);
      align-self: flex-start;
      border: 1px solid var(--border-color);
    }
    #input-container {
      padding: 1rem;
      background: var(--chat-bg);
      border-top: 1px solid var(--border-color);
      display: flex;
      gap: 0.5rem;
    }
    input[type="text"] {
      flex: 1;
      background: var(--bg-color);
      border: 1px solid var(--border-color);
      color: var(--text-color);
      padding: 0.75rem;
      border-radius: 4px;
      font-size: 1rem;
    }
    input[type="text"]:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    #send-btn {
      background: var(--accent-color);
      color: #fff;
      border: none;
      padding: 0.75rem 1.5rem;
      border-radius: 4px;
      font-weight: bold;
      cursor: pointer;
    }
    #send-btn:disabled {
      opacity: 0.5;
    }
  </style>
</head>
<body>

  <header>
    <span>CHOIIZUKA-AI</span>
    <!-- 手動切り替えスイッチ（引き算設計：1つの関数で交互に入れ替え） -->
    <button class="theme-toggle-btn" onclick="toggleThemeMode()">🌓 Mode</button>
  </header>

  <div id="status-container">🤖 System Status: Initializing environment...</div>

  <div id="chat-container">
    <div class="message ai">Welcome to CHOIIZUKA-AI. System is preparing the lightweight local intelligence.</div>
  </div>

  <div id="input-container">
    <input type="text" id="user-input" placeholder="Loading model, please wait..." disabled>
    <button id="send-btn" onclick="handleUserMessageFlow()" disabled>Send</button>
  </div>

  <script type="module">
    import { pipeline, env } from 'https://jsdelivr.net';
    env.allowLocalModels = false;

    let generatorInstance = null;
    const modelIdentifier = 'Xenova/distilgpt2';//'Xenova/Qwen1.5-0.5B-Chat';

    async function initializeLocalModel() {
      const statusElement = document.getElementById('status-container');
      const inputElement = document.getElementById('user-input');
      const buttonElement = document.getElementById('send-btn');

      try {
        statusElement.innerText = `🤖 Loading Model [${modelIdentifier}]... Fetching shards from CDN...`;
        
        generatorInstance = await pipeline('text-generation', modelIdentifier, {
          progress_callback: (data) => {
            if (data.status === 'progress') {
              statusElement.innerText = `⏳ Loading: ${data.file} (${Math.round(data.progress)}%)`;
            } else if (data.status === 'ready') {
              statusElement.innerText = `🟢 Ready: ${data.file} loaded successfully.`;
            }
          }
        });

        statusElement.innerText = "🟢 System Status: Active (100% Local Inference Engine)";
        inputElement.disabled = false;
        buttonElement.disabled = false;
        inputElement.placeholder = "Type your message here...";
        
      } catch (error) {
        statusElement.innerText = `🔴 Critical Load Error: ${error.message}`;
        console.error(error);
      }
    }

    async function handleUserMessageFlow() {
      const inputElement = document.getElementById('user-input');
      const text = inputElement.value.trim();
      
      if (!text || !generatorInstance) return;

      appendMessageToWindow(text, 'user');
      inputElement.value = '';

      const aiResponseDiv = appendMessageToWindow('🤖 Thinking...', 'ai');

      try {
        const responseData = await generatorInstance(text, {
          max_new_tokens: 120,
          temperature: 0.7,
          do_sample: true
        });

        const generatedText = responseData.generated_text;
        const cleanText = generatedText.replace(text, '').trim();
        
        aiResponseDiv.innerText = cleanText || "No response generated.";
      } catch (error) {
        aiResponseDiv.innerText = `⚠️ Inference Error: ${error.message}`;
      }
    }

    function appendMessageToWindow(messageText, senderType) {
      const chatContainer = document.getElementById('chat-container');
      const msgDiv = document.createElement('div');
      msgDiv.className = `message ${senderType}`;
      msgDiv.innerText = messageText;
      chatContainer.appendChild(msgDiv);
      chatContainer.scrollTop = chatContainer.scrollHeight;
      return msgDiv;
    }

    /**
     * 🌓 手動テーマ切り替えロジック
     * HTMLタグの data-theme 属性を反転させるだけの極小実装（トラブル要因ゼロ）
     */
    function toggleThemeMode() {
      const rootElement = document.documentElement;
      const currentTheme = rootElement.getAttribute('data-theme');
      
      if (currentTheme === 'dark') {
        rootElement.setAttribute('data-theme', 'light');
      } else if (currentTheme === 'light') {
        rootElement.setAttribute('data-theme', 'dark');
      } else {
        // 初回クリック時（OS自動判定の状態から手動に切り替える場合）
        // 現在のOS設定がダークならライトに、ライトならダークに反転
        const isOsDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        rootElement.setAttribute('data-theme', isOsDark ? 'light' : 'dark');
      }
    }

    // 各関数をグローバルにバインド
    window.handleUserMessageFlow = handleUserMessageFlow;
    window.toggleThemeMode = toggleThemeMode;

    initializeLocalModel();
  </script>
</body>
</html>
