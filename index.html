<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CHOIIZUKA-AI Sample</title>
  <style>
    :root {
      --bg-color: #1a1a1a;
      --chat-bg: #2d2d2d;
      --text-color: #ffffff;
      --accent-color: #007bff;
      --border-color: #444444;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg-color);
      color: var(--text-color);
      margin: 0;
      padding: 0;
      display: flex;
      flex-direction: column;
      height: 100vh;
    }
    header {
      background: var(--chat-bg);
      padding: 1rem;
      text-align: center;
      font-weight: bold;
      font-size: 1.2rem;
      border-bottom: 1px solid var(--border-color);
    }
    
    /* --- 🔍 デバッグ用ロードインジケーター --- */
    /* 後で非表示にしたい場合は display: none; に書き換えるかコメントアウトしてください */
    #status-container {
      background: #332200;
      color: #ffcc00;
      padding: 0.5rem 1rem;
      font-size: 0.85rem;
      font-family: monospace;
      border-bottom: 1px solid var(--border-color);
      display: block; /* 消す時は none に変更 */
    }

    #chat-container {
      flex: 1;
      overflow-y: auto;
      padding: 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }
    .message {
      max-width: 80%;
      padding: 0.75rem 1rem;
      border-radius: 8px;
      line-height: 1.5;
      word-break: break-word;
    }
    .user {
      background: var(--accent-color);
      align-self: flex-end;
    }
    .ai {
      background: var(--chat-bg);
      align-self: flex-start;
      border: 1px solid var(--border-color);
    }
    #input-container {
      padding: 1rem;
      background: var(--chat-bg);
      border-top: 1px solid var(--border-color);
      display: flex;
      gap: 0.5rem;
    }
    input[type="text"] {
      flex: 1;
      background: #111;
      border: 1px solid var(--border-color);
      color: #fff;
      padding: 0.75rem;
      border-radius: 4px;
      font-size: 1rem;
    }
    input[type="text"]:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    button {
      background: var(--accent-color);
      color: #fff;
      border: none;
      padding: 0.75rem 1.5rem;
      border-radius: 4px;
      font-weight: bold;
      cursor: pointer;
    }
    button:disabled {
      opacity: 0.5;
    }
  </style>
</head>
<body>

  <header>CHOIIZUKA-AI</header>

  <!-- 模型ロードの進行状況モニター -->
  <div id="status-container">🤖 System Status: Initializing environment...</div>

  <!-- チャット履歴表示エリア -->
  <div id="chat-container">
    <div class="message ai">Welcome to CHOIIZUKA-AI. System is preparing the lightweight local intelligence.</div>
  </div>

  <!-- 入力フォームエリア -->
  <div id="input-container">
    <input type="text" id="user-input" placeholder="Loading model, please wait..." disabled>
    <button id="send-btn" onclick="handleUserMessageFlow()" disabled>Send</button>
  </div>

  <!-- 📦 公式サンプルの挙動を100%再現するためのES Moduleインポート -->
  <script type="module">
    // Hugging Faceの公式CDNから最新のTransformers.jsを読み込む
    import { pipeline, env } from 'https://jsdelivr.net';

    // タイムアウトやローカルキャッシュエラーを防ぐための公式標準のインフラ設定
    env.allowLocalModels = false; // サーバーにモデルを置かない（CDNから安全にFetchする設定）

    let generatorInstance = null;
    const modelIdentifier = 'Xenova/Qwen1.5-0.5B-Chat'; // 動作実績の高い超軽量モデル（約40MBの量子化版）

    /**
     * ページ読み込み時に自動実行されるモデルの初期化処理
     * 進行状況（progress）を1文字ずつ検知してインジケーターに流し込む
     */
    async function initializeLocalModel() {
      const statusElement = document.getElementById('status-container');
      const inputElement = document.getElementById('user-input');
      const buttonElement = document.getElementById('send-btn');

      try {
        statusElement.innerText = `🤖 Loading Model [${modelIdentifier}]... Fetching shards from CDN...`;
        
        // 公式の progress_callback を使い、タイムアウトでフリーズするのを防ぐ
        generatorInstance = await pipeline('text-generation', modelIdentifier, {
          progress_callback: (data) => {
            if (data.status === 'progress') {
              statusElement.innerText = `⏳ Loading: ${data.file} (${Math.round(data.progress)}%)`;
            } else if (data.status === 'ready') {
              statusElement.innerText = `🟢 Ready: ${data.file} loaded successfully.`;
            }
          }
        });

        // ロード完了後にUIを安全に解放する
        statusElement.innerText = "🟢 System Status: Active (100% Local Inference Engine)";
        inputElement.disabled = false;
        buttonElement.disabled = false;
        inputElement.placeholder = "Type your message here...";
        
      } catch (error) {
        statusElement.innerText = `🔴 Critical Load Error: ${error.message}`;
        console.error(error);
      }
    }

    /**
     * チャットの送信処理
     * 生成パイプラインを非同期（async/await）で安全にキックする
     */
    async function handleUserMessageFlow() {
      const inputElement = document.getElementById('user-input');
      const chatContainer = document.getElementById('chat-container');
      const text = inputElement.value.trim();
      
      if (!text || !generatorInstance) return;

      // ユーザーの入力を画面に描画
      appendMessageToWindow(text, 'user');
      inputElement.value = '';

      // AIの思考中プレースホルダーを設置
      const aiResponseDiv = appendMessageToWindow('🤖 Thinking...', 'ai');

      try {
        // パラメータを最小限に絞り込み、ブラウザのフリーズ（タイムアウト）を回避
        const responseData = await generatorInstance(text, {
          max_new_tokens: 120,
          temperature: 0.7,
          do_sample: true
        });

        // 生成されたテキストを安全に抽出して置換
        const generatedText = responseData[0].generated_text;
        // 入力文章がそのまま返ってくるのを防ぐための簡易トリミング処理
        const cleanText = generatedText.replace(text, '').trim();
        
        aiResponseDiv.innerText = cleanText || "No response generated.";
      } catch (error) {
        aiResponseDiv.innerText = `⚠️ Inference Error: ${error.message}`;
      }
    }

    /**
     * メッセージ要素をDOMに動的に追加する共通処理
     */
    function appendMessageToWindow(messageText, senderType) {
      const chatContainer = document.getElementById('chat-container');
      const msgDiv = document.createElement('div');
      msgDiv.className = `message ${senderType}`;
      msgDiv.innerText = messageText;
      chatContainer.appendChild(msgDiv);
      chatContainer.scrollTop = chatContainer.scrollHeight; // 常に最下部へスクロール
      return msgDiv;
    }

    // グローバルスコープに関数を紐付け（HTMLのonclickから叩けるようにする）
    window.handleUserMessageFlow = handleUserMessageFlow;

    // スクリプト読み込み完了と同時に初期化を実行
    initializeLocalModel();
  </script>
</body>
</html>
