<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CHOIIZUKA-AI</title>
  <style>
    /* =======================================================
       🎨 宇宙と知性をテーマにした、ノイズゼロの極小ミニマルデザイン
       ======================================================= */
    :root { --bg: #ffffff; --text: #212529; --chat-bg: #f8f9fa; --border: #dee2e6; }
    @media (prefers-color-scheme: dark) { :root { --bg: #111111; --text: #ffffff; --chat-bg: #1a1a1a; --border: #333333; } }
    body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 0; display: flex; flex-direction: column; height: 100vh; }
    header { padding: 1.5rem; text-align: center; font-weight: bold; font-size: 1.1rem; letter-spacing: 0.1em; border-bottom: 1px solid var(--border); }
    #status-container { padding: 0.75rem; text-align: center; font-size: 0.8rem; letter-spacing: 0.05em; color: #888; border-bottom: 1px solid var(--border); }
    #chat-container { flex: 1; overflow-y: auto; padding: 2rem; display: flex; flex-direction: column; gap: 1rem; }
    .message { max-width: 80%; padding: 0.75rem 1.2rem; border-radius: 12px; line-height: 1.6; font-size: 0.95rem; }
    .ai { background: var(--chat-bg); align-self: flex-start; border: 1px solid var(--border); }
    #input-container { padding: 1.5rem; background: var(--bg); border-top: 1px solid var(--border); display: flex; gap: 0.5rem; }
    input[type="text"] { flex: 1; background: var(--chat-bg); border: 1px solid var(--border); color: var(--text); padding: 0.8rem 1rem; border-radius: 6px; font-size: 1rem; outline: none; }
    input[type="text"]:disabled { opacity: 0.3; cursor: not-allowed; }
  </style>
</head>
<body>

  <header>CHOIIZUKA-AI</header>

  <!-- 🌌 ジョブズ仕様：無駄な数値やエラーを見せず、世界の美しさだけを提示するインジケーター -->
  <div id="status-container">Connecting to the Cosmic Intelligence Network...</div>

  <div id="chat-container">
    <div class="message ai">Welcome to CHOIIZUKA-AI. Exploring the scientific truth of the universe.</div>
  </div>

  <div id="input-container">
    <input type="text" id="user-input" placeholder="Preparing the brain..." disabled>
  </div>

  <script type="module">
    import { pipeline, env } from 'https://jsdelivr.net';
    env.allowLocalModels = false;
    env.backends.onnx.wasm.wasmPaths = 'https://jsdelivr.net/dist/';
    env.backends.onnx.customOpLibraryPath = null;

    const modelIdentifier = 'Xenova/distilgpt2'; // 35MB級・英語特化最軽量モデル
    let generatorInstance = null;
    
    let watchdogTimer = null;
    const WATCHDOG_TIMEOUT_MS = 300000; // 1分間進捗がなければ静かにタイムアウト判定
    const RETRY_DELAY_MS = 60000;       // 10秒待って裏で静かにリトライ

    function resetWatchdog() {
      if (watchdogTimer) clearTimeout(watchdogTimer);
      watchdogTimer = setTimeout(() => {
        handleLoadTimeoutSilently();
      }, WATCHDOG_TIMEOUT_MS);
    }

    /**
     * 🤫 ユーザーに悟られず、裏で静かに再接続を試みるリトライ回路
     */
    function handleLoadTimeoutSilently() {
      if (watchdogTimer) clearTimeout(watchdogTimer);
      
      // ジョブズ激怒の「ダサいカウントダウン」や「エラー表示」を完全消去。
      // あたかも「宇宙の大きな波を待っているだけ」のような静かな表示を維持します。
      document.getElementById('status-container').innerText = "Syncing with intelligence network nodes...";

      setTimeout(() => {
        initializeLocalModelWithRetry();
      }, RETRY_DELAY_MS);
    }

    async function initializeLocalModelWithRetry() {
      const statusElement = document.getElementById('status-container');
      const inputElement = document.getElementById('user-input');

      if (watchdogTimer) clearTimeout(watchdogTimer);

      try {
        resetWatchdog();

        generatorInstance = await pipeline('text-generation', modelIdentifier, {
          progress_callback: (data) => {
            if (data.status === 'progress') {
              resetWatchdog();
              // ％の数値をガタガタ表示させるのをやめ、滑らかなテキスト表現のみに固定（引き算の極み）
              statusElement.innerText = "Downloading intelligent shards smoothly...";
            }
          }
        });

        // 成功した瞬間、一瞬で「🟢 Active」へ昇華
        clearTimeout(watchdogTimer);
        statusElement.innerText = "🟢 System Status: Active";
        inputElement.disabled = false;
        inputElement.placeholder = "Type your message here...";
        
      } catch (error) {
        // エラーを吐いてコケても、画面を赤く汚さず、静かにリトライにフォワード
        handleLoadTimeoutSilently();
      }
    }

    initializeLocalModelWithRetry();
  </script>
</body>
</html>
